name: Refresh GTFS Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run process-gtfs

      - name: Commit updated route data
        run: |
          git diff --quiet public/routes-data.json && {
            echo "routes-data.json is already up to date"
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/routes-data.json
          git commit -m "Update routes-data.json with latest GTFS data"
          git push
