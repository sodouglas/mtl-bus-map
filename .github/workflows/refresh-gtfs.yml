name: Refresh GTFS Data

on:
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore GTFS processing cache
        uses: actions/cache@v4
        with:
          path: scripts/.gtfs-cache
          key: gtfs-cache-${{ runner.os }}
          restore-keys: gtfs-cache-

      - run: npm ci

      - run: npm run process-gtfs

      - name: Commit updated route data
        run: |
          git diff --quiet public/routes-data-montreal.json public/routes-data-ttc.json && {
            echo "Route data is already up to date"
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/routes-data-montreal.json public/routes-data-ttc.json
          git commit -m "Update route data with latest GTFS data"
          git push
